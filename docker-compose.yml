services:
  # 1. App Service (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adsis_cb2_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - adsis_cb2_network

  # 2. Gateway Service (Nginx)
  webserver:
    image: nginx:alpine
    container_name: adsis_cb2_webserver
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - adsis_cb2_network

  # 3. Database Service (MySQL)
  db:
    image: mysql:8.0
    container_name: adsis_cb2_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - adsis_cb2_network

  # 4. Storage Service (MinIO)
  minio:
    image: minio/minio
    container_name: adsis_cb2_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - ./storage/minio:/data
    networks:
      - adsis_cb2_network

  # 5. Tools Service (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: adsis_cb2_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - adsis_cb2_network

# Konfigurasi Custom Bridge Network
networks:
  adsis_cb2_network:
    driver: bridge

# Konfigurasi Persistensi Volume
volumes:
  db_data: